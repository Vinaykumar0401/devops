apiVersion: v1
kind: ReplicationController
metadata:
  name: first-rc  
spec:
  replicas: 3
  template:
    metadata:
      labels:
        app: first-app
    spec:
      containers:
        - name: first-container
          image: nginx
          command:
            - "sh"
            - "-c"
            - "echo Hello ReplicationController! && sleep 3600"
          ports:
            - containerPort: 80