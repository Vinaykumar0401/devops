apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: first-rs 
spec:
  replicas: 3
  selector:
    matchLabels:
      app: first-app
  template:
    metadata:
      labels:
        app: first-app
    spec:
      containers:
        - name: first-container
          image: nginx
          command:
            - "sh"
            - "-c"
            - "echo Hello Rs! && sleep 3600"
      