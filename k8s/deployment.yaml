apiVersion: apps/v1
kind: Deployment
metadata:
  name: first-deploy
spec:
  replicas: 2
  selector:
    matchLabels: 
      app: deployment
  template:
    metadata:
      labels:
        app: deployment
    spec:
      containers:
        - image: nginx
          name: nginix-container
          command:
          - "sh"
          - "-c"
          - "echo deployement && sleep 3600"

